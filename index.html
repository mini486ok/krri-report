<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>간부회의자료 작성 — 작성자 페이지</title>
  <link rel="stylesheet" href="./assets/css/app.css?v=4" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div>
        <strong>간부회의자료 작성</strong>
        <span class="muted" style="margin-left:8px" id="round-info">로딩 중…</span>
      </div>
    </div>

    <div class="tabs" id="author-tabs">
      <button class="tab active" data-tab="current">현재 회차 작성</button>
      <button class="tab" data-tab="archive">아카이브 보기</button>
    </div>

    <div id="tab-current" class="tab-panels">
      <div class="layout">
        <div id="main-area">
          <div class="banner" id="boot-banner">
            HTML 로드됨 · 자바스크립트 모듈 로딩 중…
            <span class="muted" id="boot-timer">(0초)</span>
          </div>
        </div>
        <div>
          <div class="panel">
            <h2>미리보기 (HTML)</h2>
            <div class="muted tight">실제 HWPX 출력과 레이아웃이 유사하지만 폰트·행간은 다소 차이가 있을 수 있습니다.</div>
            <div id="preview-area" style="margin-top:8px"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-archive" class="tab-panels" hidden>
      <div id="archive-area"></div>
    </div>
  </div>
  <script>
    (function(){
      var htmlLoadedAt = Date.now();
      window.__htmlLoadedAt = htmlLoadedAt;
      console.log('[index.html] HTML loaded at', new Date(htmlLoadedAt).toISOString());
      var timerEl = document.getElementById('boot-timer');
      var iv = setInterval(function(){
        var s = Math.floor((Date.now() - htmlLoadedAt)/1000);
        if (timerEl) timerEl.textContent = '(' + s + '초)';
        if (s === 3 && !window.__authorViewEntered) {
          var b = document.getElementById('boot-banner');
          if (b) b.innerHTML =
            '<strong style="color:#b91c1c">⚠ JavaScript 모듈 실행 지연</strong> '
            + '<span class="muted">(' + s + '초)</span><br/>'
            + '3초가 지났는데도 author-view.js 가 실행되지 않았습니다. 시크릿 창(Ctrl+Shift+N)에서 재시도하거나 F12 → Console 에러를 확인하세요.';
        }
        if (window.__authorViewEntered) clearInterval(iv);
      }, 1000);
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    (function(){
      var s = document.createElement('script');
      s.type = 'module';
      s.src = './assets/js/views/author-view.js?v=' + Date.now();
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
